<tr id="ticket-{{ ticket.id }}">
  {% if can_edit_all %}
    <td><input type="checkbox" class="ticket-select" data-ticket-id="{{ ticket.id }}"></td>
  {% endif %}
  <td><i class="fa {% if ticket.is_open %}fa-exclamation-circle{% else %}fa-check-circle{% endif %}"></i></td>
  <td>{{ ticket.id }}</td>
  <td><a href="{{ url('ticket', ticket.id) }}">{{ ticket.title }}</a></td>
  <td>{{ link_user(ticket.user_id) }}</td>
  <td>{{ link_users(ticket.get_assignee_ids()) }}</td>
</tr>
