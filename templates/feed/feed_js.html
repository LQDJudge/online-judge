<script>
  {% if next_cursor is defined and next_cursor %}
    window.next_cursor = "{{ next_cursor }}";
  {% else %}
    window.next_cursor = null;
  {% endif %}
  window.feed_token = "{{ feed_token or '' }}";
  window.page = {{ page_obj.number if page_obj is defined else 1 }};
  window.has_next_page = {{1 if has_next_page else 0}};
  window.loading_page = false;
  $(function() {
    function getQueryParams() {
      var queryParams = {};
      var query = window.location.search.substring(1);
      var vars = query.split("&");
      for (var i = 0; i < vars.length; i++) {
        var pair = vars[i].split("=");
        var key = decodeURIComponent(pair[0]);
        if (!key) continue;
        var value = decodeURIComponent((pair[1] || '').replace(/\+/g, ' '));
        queryParams[key] = value;
      }
      return queryParams;
    }

    function loadNextPage() {
      window.loading_page = true;
      var params = {
        "only_content": 1,
      };

      if (window.next_cursor) {
        params["cursor"] = window.next_cursor;
        params["ft"] = window.feed_token;
      } else {
        params["page"] = window.page + 1;
      }

      params = Object.assign({}, getQueryParams(), params);

      $.get("{{feed_content_url}}", params)
        .done(function(data) {
          $(".has_next").remove();
          $(".next-cursor").remove();
          $(".middle-content").append(data);
          window.loading_page = false;
          window.has_next_page = parseInt($(".has_next").attr("value"));
          var newCursor = $(".next-cursor").attr("value");
          if (newCursor) {
            window.next_cursor = newCursor;
          } else {
            window.next_cursor = null;
            window.page++;
          }
          renderKatex($('.middle-content')[0]);
          onWindowReady();
        })
    }

    var firstScroll = true;
    $(window).on("scroll", function() {
      if (window.loading_page || !window.has_next_page) return;
      var isDesktop = window.matchMedia('(min-width: 800px)').matches;
      if (!isDesktop) return;

      // Load page 2 immediately on first scroll
      if (firstScroll) {
        firstScroll = false;
        loadNextPage();
        return;
      }

      var distanceFromBottom = $(document).height() - ($(window).scrollTop() + $(window).height());
      if (distanceFromBottom < 500) {
        loadNextPage();
      }
    });

    $(document).on("click", ".view-next-page", () => {
      if (window.loading_page || !window.has_next_page) return;
      var isDesktop = window.matchMedia('(min-width: 800px)').matches;
      if (isDesktop) return;
      $(".view-next-page").remove();
      loadNextPage();
    });
  });
</script>
