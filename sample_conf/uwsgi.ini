[uwsgi]
uwsgi-socket = /tmp/dmoj-site.sock
chmod-socket = 666
pidfile = /tmp/dmoj-site.pid

# Paths - adjust to your installation.
chdir = <path to online-judge>
pythonpath = <path to online-judge>
virtualenv = <path to virtualenv>

# Django application.
protocol = uwsgi
master = true
env = DJANGO_SETTINGS_MODULE=dmoj.settings
module = dmoj.wsgi:application
optimize = 2

# Scaling settings. Tune based on your server resources.
memory-report = true
cheaper-algo = busyness
cheaper = 4
cheaper-initial = 8
cheaper-step = 2
cheaper-busyness-min = 20
cheaper-busyness-max = 70
cheaper-busyness-multiplier = 30
workers = 12
threads = 2

# Request limits.
harakiri = 15
harakiri-verbose = true
max-requests = 5000
max-requests-delta = 500
max-worker-lifetime = 7200

# Memory limits - auto-reload workers that use too much memory.
reload-on-rss = 350
evil-reload-on-rss = 500

no-orphans = true
vacuum = true
die-on-term = true
